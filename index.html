<style>
:root{
  --bg:#0b0f14;
  --panel:#111823;
  --panel2:#0f1620;
  --border:#243041;
  --text:#e6edf3;
  --muted:#8b949e;
  --blue:#58a6ff;
  --green:#2ea043;
  --red:#f85149;
}

body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background: radial-gradient(circle at top, #0d1117, var(--bg));
  color:var(--text);
}

/* HEADER */
header{
  text-align:center;
  padding:28px 16px;
  background: linear-gradient(135deg, var(--panel), var(--panel2));
  border-bottom:1px solid var(--border);
}

header h1{
  margin:0;
  font-size:2.6em;
  letter-spacing:1px;
  background: linear-gradient(90deg,var(--blue),#7ee787);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

header p{
  margin:6px 0;
  color:var(--muted);
}

/* STATUS */
.status{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  font-weight:600;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--red);
  box-shadow:0 0 12px var(--red);
}

/* NAV */
nav{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:10px;
  background: rgba(17,24,35,0.85);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--border);
}

nav a{
  text-decoration:none;
  color:var(--text);
  background:rgba(255,255,255,0.06);
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
  transition:0.2s;
}

nav a:hover{
  background:var(--blue);
  color:#000;
  transform:translateY(-1px);
}

/* LAYOUT */
section{
  max-width:1050px;
  margin:auto;
  padding:20px;
}

/* CARDS */
.card{
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media(max-width:750px){
  .grid{grid-template-columns:1fr;}
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0b0f14;
  color:var(--text);
}

/* BUTTONS */
button{
  background:linear-gradient(135deg,var(--green),#238636);
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
  filter:brightness(1.1);
}

/* IMAGES */
img{
  width:100%;
  border-radius:12px;
  border:1px solid var(--border);
}

/* DX BOX */
.dx{
  font-family: ui-monospace, monospace;
  font-size:13px;
  background:#0b0f14;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  max-height:260px;
  overflow-y:auto;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:var(--muted);
  border-top:1px solid var(--border);
  margin-top:20px;
}
</style>
