<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(circle at top, #0d1117, #070a0f);
  color: #e6edf3;
}

/* HEADER */
header {
  padding: 28px 20px;
  text-align: center;
  background: linear-gradient(135deg, #161b22, #0f1720);
  border-bottom: 1px solid #2a3441;
}

header h1 {
  margin: 0;
  font-size: 2.6em;
  letter-spacing: 1px;
  background: linear-gradient(90deg, #58a6ff, #7ee787);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* STATUS */
.status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  margin-top: 10px;
}

.dot {
  height: 12px;
  width: 12px;
  border-radius: 50%;
  background: #f85149;
  box-shadow: 0 0 12px #f85149;
}

/* NAV */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: rgba(22, 27, 34, 0.7);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid #2a3441;
  position: sticky;
  top: 0;
  z-index: 10;
}

nav a {
  color: #c9d1d9;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(48, 54, 61, 0.6);
  transition: 0.2s;
}

nav a:hover {
  background: #58a6ff;
  color: #000;
  transform: translateY(-1px);
}

/* SECTIONS */
section {
  padding: 24px;
  max-width: 980px;
  margin: auto;
}

/* CARDS */
.card {
  background: linear-gradient(145deg, #161b22, #11161d);
  padding: 22px;
  border-radius: 16px;
  margin-bottom: 18px;
  border: 1px solid #2a3441;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 700px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #2a3441;
  background: #0d1117;
  color: #e6edf3;
}

/* BUTTONS */
button {
  background: linear-gradient(135deg, #238636, #2ea043);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.1);
}

/* DX BOX */
.dx {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.9em;
  background: #0b0f14;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #2a3441;
  max-height: 260px;
  overflow-y: auto;
}

/* IMAGES */
img {
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #0d1117;
  border-top: 1px solid #2a3441;
  color: #8b949e;
}

/* MOBILE */
@media (max-width: 600px) {
  header h1 { font-size: 2em; }
}
</style>
